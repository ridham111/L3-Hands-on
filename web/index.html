/* ---------- wiring diagram ---------- */
const WIRE_SYMBOL = {
  component:'C', service:'S', template:'T', model:'M',
  binding:'B', module:'X', code:'ƒ', doc:'#', style:'~',
};
const WIRE_COLOR = {
  component:'#5b8ff9', service:'#52c4a0', template:'#e8834a',
  model:'#9e7ee8',     binding:'#e06b82', module:'#e8c44a',
  code:'#8a9bb0',      doc:'#78b87c',     style:'#c07ac8',
};
const WIRE_EDGE_COLOR = {import:'#c8845a', folder:'#706050', related:'#3e3830'};
const EDGE_DASH = {import:'', folder:'6 4', related:'2 5'};
let _wireSeq = 0;

/* ── wiring zoom state: null=fit-to-width, number=explicit scale ── */
const _wireState = {};
function _wGet(id){ return _wireState[id]||(_wireState[id]={s:null}); }
function _wApply(id){
  const st=_wGet(id);
  const wrap=document.getElementById(id); if(!wrap) return;
  const svg=wrap.querySelector('svg.wire'); if(!svg) return;
  const canvas=wrap.querySelector('.wire-canvas'); if(!canvas) return;
  const nw=+svg.dataset.nw, nh=+svg.dataset.nh, ch=Math.min(nh,380);
  const lbl=wrap.querySelector('.wire-zoom-label');
  if(st.s===null){
    // Fit mode: SVG scales to fill container width — all nodes visible, no scroll needed
    svg.removeAttribute('width'); svg.removeAttribute('height');
    svg.style.cssText='width:100%;height:auto;max-height:'+ch+'px;display:block';
    canvas.style.overflowX='hidden'; canvas.style.cursor='default';
    if(lbl) lbl.textContent='fit';
  } else {
    // Zoomed: fixed pixel size, container scrolls horizontally
    svg.style.cssText='display:block';
    svg.setAttribute('width', Math.round(nw*st.s));
    svg.setAttribute('height', Math.round(ch*st.s));
    canvas.style.overflowX='auto'; canvas.style.cursor='grab';
    if(lbl) lbl.textContent=Math.round(st.s*100)+'%';
  }
}
function wireZoomIn(id){
  const st=_wGet(id);
  const svg=document.querySelector('#'+id+' svg.wire');
  const canvas=document.querySelector('#'+id+' .wire-canvas');
  const nw=+(svg?.dataset?.nw||600), cw=(canvas?.clientWidth||600);
  const cur=st.s!==null?st.s:cw/nw;
  st.s=Math.min(2.5,+(cur+0.25).toFixed(2)); _wApply(id);
}
function wireZoomOut(id){
  const st=_wGet(id);
  const svg=document.querySelector('#'+id+' svg.wire');
  const canvas=document.querySelector('#'+id+' .wire-canvas');
  const nw=+(svg?.dataset?.nw||600), cw=(canvas?.clientWidth||600);
  const fitS=cw/nw;
  if(st.s===null||st.s<=fitS+0.01){ st.s=null; }
  else { st.s=Math.max(fitS,+(st.s-0.25).toFixed(2)); }
  _wApply(id);
}
function wireZoomReset(id){ _wGet(id).s=null; _wApply(id); }
function wireCanvasDrag(e,id){
  if(e.button!==0) return;
  const st=_wGet(id); if(st.s===null) return; // no drag in fit mode
  const canvas=e.currentTarget, sx=e.clientX+canvas.scrollLeft;
  canvas.style.cursor='grabbing';
  const mv=me=>{ canvas.scrollLeft=sx-me.clientX; };
  const up=()=>{ canvas.style.cursor='grab';
    document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); };
  document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
}

function renderWiring(w){
  if (!w || (w.nodes||[]).length < 2) return '';
  const id = 'wire' + (++_wireSeq);
  const NW=212, NH=54, COLW=254, ROWV=74, PX=26, PY=28;

  const byDepth = {};
  w.nodes.forEach(n => { const d=n.depth??0; (byDepth[d]=byDepth[d]||[]).push(n); });
  const levels = Object.keys(byDepth).map(Number).sort((a,b)=>a-b);
  const maxPerCol = Math.max(1, ...levels.map(d=>byDepth[d].length));
  const W = PX*2 + (levels.length-1)*COLW + NW;
  const H = PY*2 + (maxPerCol-1)*ROWV + NH + 36; // extra bottom clearance for below-routing

  const pos = {};
  levels.forEach((d,ci) => {
    const grp = byDepth[d];
    const startY = PY + ((maxPerCol - grp.length) * ROWV) / 2;
    grp.forEach((n,ri) => {
      pos[n.id] = {x:PX+ci*COLW, y:startY+ri*ROWV, role:n.role, label:n.label,
                   dir:n.dir||'', entry:n.entry, symbols:n.symbols||[]};
    });
  });

  // Per-edge-kind arrow markers
  const markerDef = '<defs>'
    + Object.entries(WIRE_EDGE_COLOR).map(([kind,col]) =>
        '<marker id="'+id+'mk-'+kind+'" viewBox="0 0 10 10" refX="9" refY="5" '
        +'markerWidth="5" markerHeight="5" orient="auto-start-reverse">'
        +'<path d="M1 2.5 L9 5 L1 7.5 z" fill="'+col+'" opacity=".85"/></marker>'
      ).join('')
    +'</defs>';

  // Edges
  let edges = '', edgeLabels = '', ei = 0;
  w.edges.forEach(e => {
    const a=pos[e.from], b=pos[e.to]; if(!a||!b) return;
    const eid = id+'e'+ei;
    const kind = e.kind||'related';
    const sc = WIRE_EDGE_COLOR[kind]||'#888';
    const dash = EDGE_DASH[kind];
    let pathD, mx, my;

    const isSameCol = Math.abs(a.x - b.x) < 5;
    if(isSameCol){
      // Same column: route to the right with a smooth S-loop
      const sx=a.x+NW, sy=a.y+NH/2, ex=b.x+NW, ey=b.y+NH/2;
      const ox=38;
      pathD='M'+sx+' '+sy+' C'+(sx+ox)+' '+sy+' '+(ex+ox)+' '+ey+' '+ex+' '+ey;
      mx=sx+ox; my=(sy+ey)/2;
    } else if(a.x < b.x){
      // Forward (left→right): smooth horizontal bezier, exit right / enter left
      const sx=a.x+NW, sy=a.y+NH/2, ex=b.x, ey=b.y+NH/2;
      const span=ex-sx, cp=span*0.46;
      pathD='M'+sx+' '+sy+' C'+(sx+cp)+' '+sy+' '+(ex-cp)+' '+ey+' '+ex+' '+ey;
      mx=(sx+ex)/2; my=(sy+ey)/2;
    } else {
      // Backward: route below the diagram, arc under all nodes
      const sx=a.x+NW/2, sy=a.y+NH, ex=b.x+NW/2, ey=b.y+NH;
      const belowY = H - 10;
      pathD='M'+sx+' '+sy+' C'+sx+' '+belowY+' '+ex+' '+belowY+' '+ex+' '+ey;
      mx=(sx+ex)/2; my=belowY;
    }

    edges += '<path class="we we-'+kind+'" id="'+eid
      +'" data-a="'+esc(e.from)+'" data-b="'+esc(e.to)+'"'
      +' stroke="'+sc+'"'+(dash?' stroke-dasharray="'+dash+'"':'')
      +' pathLength="1"'
      +' style="animation-delay:'+(ei*45)+'ms"'
      +' d="'+pathD+'" marker-end="url(#'+id+'mk-'+kind+')"/>';

    // Import name label (shown on hover)
    const impNames = (e.imports||[]).slice(0,3);
    if(impNames.length && kind==='import'){
      const lbl = impNames.join(', ');
      const lblW = Math.min(lbl.length*6+18, 180), lblH=17;
      const lx = Math.max(PX, Math.min(W-lblW-PX, mx-lblW/2));
      const ly = Math.min(my-22, H-20);
      edgeLabels += '<g class="we-lbl" data-eid="'+eid+'">'
        +'<rect x="'+lx+'" y="'+ly+'" width="'+lblW+'" height="'+lblH
        +'" rx="4" fill="#18160f" stroke="#3a3326" stroke-width="1" opacity=".95"/>'
        +'<text x="'+(lx+9)+'" y="'+(ly+11.5)
        +'" font-family="ui-monospace,monospace" font-size="8.5" fill="#c8a870">'+esc(lbl)+'</text>'
        +'</g>';
    }
    ei++;
  });

  // Nodes — role dot + filename + short directory path
  let nodes = '';
  w.nodes.forEach((n,k) => {
    const p = pos[n.id]; if(!p) return;
    const c = WIRE_COLOR[p.role]||'#8a9bb0';
    const sym = WIRE_SYMBOL[p.role]||'ƒ';
    const fname = p.label;
    const fshort = fname.length>22 ? fname.slice(0,21)+'…' : fname;
    const dir = (n.id.includes('/') ? n.id.split('/').slice(0,-1).join('/') : '');
    const dirShort = dir.length>26 ? '…'+dir.slice(-25) : dir;
    const full = n.id;
    const tipW = Math.min(Math.max(full.length*6.2+18,100),310);
    const tipX = Math.max(2, Math.min(p.x-(tipW-NW)/2, W-tipW-4));
    // Place tooltip below node; flip above if near bottom
    const tipBelow = p.y + NH + 6;
    const tipY = tipBelow + 22 < H ? tipBelow : p.y - 28;

    nodes += '<g class="wnode" data-id="'+esc(n.id)+'"'
      +' onclick="wireOpenSource(event)" onmouseenter="wireEnter(event)" onmouseleave="wireLeave(event)"'
      +' style="animation-delay:'+(180+k*45)+'ms">'
      // Card
      +'<rect class="wn" x="'+p.x+'" y="'+p.y+'" width="'+NW+'" height="'+NH+'" rx="10"'
        +' stroke="'+(p.entry?'var(--brand)':'var(--line-strong)')+'"'
        +' stroke-width="'+(p.entry?1.6:1)+'"/>'
      // Entry glow strip across top
      +(p.entry
        ? '<rect x="'+(p.x+10)+'" y="'+p.y+'" width="'+(NW-20)+'" height="2" rx="1" fill="var(--brand)" opacity=".6"/>'
        : '')
      // Role dot
      +'<circle cx="'+(p.x+16)+'" cy="'+(p.y+NH/2)+'" r="4.5" fill="'+c+'" opacity=".9"/>'
      // Role symbol inside dot area (tiny)
      +'<text x="'+(p.x+16)+'" y="'+(p.y+NH/2+3.5)+'" font-size="6" fill="#fff" font-weight="800"'
        +' text-anchor="middle" font-family="ui-monospace,monospace" opacity=".9">'+sym+'</text>'
      // Filename
      +'<text class="wlbl" x="'+(p.x+28)+'" y="'+(p.y+(dirShort?21:NH/2+4.5))+'">'+esc(fshort)+'</text>'
      // Directory path
      +(dirShort
        ? '<text class="wlbl2" x="'+(p.x+28)+'" y="'+(p.y+36)+'">'+esc(dirShort)+'</text>'
        : '')
      // Tooltip (full path, on hover)
      +'<g class="wtooltip">'
        +'<rect x="'+tipX+'" y="'+tipY+'" width="'+tipW+'" height="20" rx="5"'
          +' fill="#18160f" stroke="#3a3326" stroke-width="1"/>'
        +'<text x="'+(tipX+9)+'" y="'+(tipY+13.5)
          +'" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#e0d8c8" font-weight="500">'
          +esc(full)+'</text>'
      +'</g>'
      +'</g>';
  });

  // Legend
  const roles = [...new Set(w.nodes.map(n=>n.role))];
  const legend = roles.map(r=>
    '<span><svg width="10" height="10" viewBox="0 0 10 10" style="flex:none">'
    +'<circle cx="5" cy="5" r="5" fill="'+(WIRE_COLOR[r]||'#8a9bb0')+'"/>'
    +'<text x="5" y="8.5" font-size="5.5" fill="#fff" font-weight="800" text-anchor="middle" font-family="monospace">'
    +(WIRE_SYMBOL[r]||'?')+'</text>'
    +'</svg>'+r+'</span>'
  ).join('')
    +'<span class="ek"><b style="border-top:2px solid '+WIRE_EDGE_COLOR.import+'"></b>imports</span>'
    +'<span class="ek"><b style="border-top:2px dashed '+WIRE_EDGE_COLOR.folder+'"></b>folder</span>';

  const autoOpen = w.nodes.length >= 3;
  return '<div class="wirewrap'+(autoOpen?' open':'')+'" id="'+id+'">'
    +'<div class="wire-h" onclick="this.parentElement.classList.toggle(\'open\')">'
    +'<span class="caret">▶</span><strong>File connections</strong>'
    +'<span style="color:var(--faint);margin-left:8px;font-size:11px">'+w.nodes.length+' files · '+w.edges.length+' links</span>'
    +'<span class="wire-hint">+ − to zoom · drag to pan · click to open</span>'
    +'</div>'
    +'<div class="wire-body">'
    +'<div class="wire-ctrl">'
    +'<button onclick="wireZoomOut(\''+id+'\')" title="Zoom out">−</button>'
    +'<span class="wire-zoom-label">100%</span>'
    +'<button onclick="wireZoomIn(\''+id+'\')" title="Zoom in">+</button>'
    +'<button class="wire-fit" onclick="wireZoomReset(\''+id+'\')" title="Reset zoom">⊙</button>'
    +'<div class="wire-legend" style="margin-left:8px">'+legend+'</div>'
    +'</div>'
    +'<div class="wire-canvas" onmousedown="wireCanvasDrag(event,\''+id+'\')">'
    +'<svg class="wire" viewBox="0 0 '+W+' '+H+'" data-nw="'+W+'" data-nh="'+H
    +'" style="width:100%;height:auto;max-height:'+Math.min(H,380)+'px;display:block">'
    +markerDef
    +'<g class="wire-vp">'
    +edges+edgeLabels+nodes
    +'</g>'
    +'</svg></div></div></div>';
}

function wireEnter(ev){
  const g=ev.currentTarget, svg=g.closest('svg'), id=g.getAttribute('data-id');
  g.querySelector('.wtooltip')?.classList.add('show');
  svg.classList.add('focusing');
  svg.querySelectorAll('.wnode').forEach(n=>n.classList.toggle('dim',n.getAttribute('data-id')!==id));
  svg.querySelectorAll('.we').forEach(e=>{
    const hit=e.getAttribute('data-a')===id||e.getAttribute('data-b')===id;
    e.classList.toggle('lit',hit);
    e.classList.toggle('dim',!hit);
    if(hit){
      const eid=e.id;
      if(eid) svg.querySelector('.we-lbl[data-eid="'+eid+'"]')?.classList.add('show');
      const other=e.getAttribute('data-a')===id?e.getAttribute('data-b'):e.getAttribute('data-a');
      svg.querySelector('.wnode[data-id="'+CSS.escape(other)+'"]')?.classList.remove('dim');
    }
  });
}
function wireLeave(ev){
  const g=ev.currentTarget, svg=g.closest('svg');
  g.querySelector('.wtooltip')?.classList.remove('show');
  svg.classList.remove('focusing');
  svg.querySelectorAll('.wnode').forEach(n=>n.classList.remove('dim'));
  svg.querySelectorAll('.we').forEach(e=>e.classList.remove('lit','dim'));
  svg.querySelectorAll('.we-lbl').forEach(l=>l.classList.remove('show'));
}
function wireOpenSource(ev){
  // clicking a connection node opens the WHOLE file — works in chat, tour, and
  // walkthrough (it no longer depends on the chat turn's snippet map)
  const node = ev.currentTarget;
  const path = node.dataset.id;
  if (!path) return;
  const svg = node.closest('svg');
  if (svg) svg.querySelectorAll('.wnode').forEach(n => n.classList.toggle('active', n === node));
  openFileViewer(path);
}
function renderSources(d){
  const srcs = (d.sources || []).filter(s => s.score > 0 || s.used);
  if (!srcs.length){
    // Only surface a warning when ungrounded; show nothing when grounded with no sources
    return d.grounded ? '' : '<div class="src-bar"><span class="chip bad">⚠ Ungrounded</span></div>';
  }
  const bestScore = Math.max(...srcs.map(s => s.score || 0));
  const scoreW = Math.round(bestScore * 100);
  const srcCount = srcs.length + ' source' + (srcs.length > 1 ? 's' : '') + ' verified';
  const retrieval = scoreW > 0
    ? '<span class="ret-label">RETRIEVAL ' + scoreW + '%</span>'
      + '<span class="ret-bar"><i style="width:' + scoreW + '%"></i></span>'
    : '';
  const grndChip = d.grounded
    ? '<span class="chip ok">✓ Grounded</span>'
    : '<span class="chip bad">⚠ Ungrounded</span>';
  const bar = '<div class="src-bar">' + grndChip
    + '<span class="src-count">' + srcCount + '</span>'
    + (retrieval ? '<span class="src-bar-r">' + retrieval + '</span>' : '')
    + '</div>';
  const cards = srcs.map((s, i) => {
    const lines = (s.line_start && s.line_end) ? ' L' + s.line_start + '–' + s.line_end : '';
    const sc = Math.round((s.score || 0) * 100);
    const snippet = s.snippet ? '<div class="src-snippet"><pre>' + esc(s.snippet) + '</pre></div>' : '';
    return '<div class="src-card' + (i === 0 ? ' open' : '') + '" onclick="this.classList.toggle(\'open\')">'
      + '<div class="src-card-head">'
      + '<span class="src-ic">&lt;/&gt;</span>'
      + '<span class="src-path" data-openfile="' + esc(s.path) + '" onclick="event.stopPropagation();openFileViewer(this.dataset.openfile)">' + esc(s.path) + '</span>'
      + '<span class="src-lines">' + esc(lines) + '</span>'
      + '<span class="src-score-wrap"><span class="src-score-n">' + sc + '</span>'
      + '<span class="src-score-bar"><i style="width:' + sc + '%"></i></span></span>'
      + '<span class="src-toggle">›</span>'
      + '</div>' + snippet + '</div>';
  }).join('');
  return bar + '<div class="srcs-block"><div class="srcs-h">Cited from the index</div>' + cards + '</div>';
}

/* ---------- full-file viewer (modal) ---------- */
const FV_DOCK_MIN = 1180;  // px: wider than this docks the file beside the chat
function _applyFvMode(){
  const modal = $('#fileModal');
  if (!modal.classList.contains('open')) return;
  const dock = window.innerWidth >= FV_DOCK_MIN;
  modal.classList.toggle('fv-dock', dock);
  $('#app').classList.toggle('fv-docked', dock);
}
window.addEventListener('resize', _applyFvMode);

async function openFileViewer(path){
  if (!path) return;
  if (!activeNs) return toast('Select a repo first', true);
  const modal = $('#fileModal'), body = $('#fvBody');
  $('#fvPath').textContent = path;
  body.innerHTML = '<div class="fv-loading">Loading ' + esc(path) + '…</div>';
  modal.classList.add('open');
  _applyFvMode();  // dock on the right (wide screens) or center as a modal (laptops)
  try {
    const f = await api('/v1/file/' + encodeURIComponent(activeNs) + '?path=' + encodeURIComponent(path));
    const meta = '<div class="fv-meta">' + esc(f.language || '') + ' · ' + (f.lines || 0) + ' lines'
      + (f.truncated ? ' · <span class="fv-trunc">large file — showing the first indexed portion</span>' : '') + '</div>';
    body.innerHTML = meta + '<pre class="fv-code">' + highlight(f.content || '') + '</pre>';
    body.scrollTop = 0;
  } catch (e){
    body.innerHTML = '<div class="fv-loading">Couldn\'t load <bdi>' + esc(path) + '</bdi> — ' + esc(e.message) + '</div>';
  }
}
function closeFileViewer(){
  $('#fileModal').classList.remove('open', 'fv-dock');
  $('#app').classList.remove('fv-docked');
  document.querySelectorAll('.wnode.active').forEach(n => n.classList.remove('active'));
}

/* ---------- orient button active state ---------- */
function _setOrientActive(id){
  ['tourBtn','walkBtn'].forEach(bid => {
    const b = $('#'+bid);
    if (!b) return;
    const isActive = bid === id;
    b.classList.toggle('orient-primary', isActive);
    b.classList.toggle('orient-ghost', !isActive);
  });
}

/* ---------- guided codebase tour ---------- */
let _tour = null;
async function startTour(){
  if (!activeNs) return toast('Select a repo first', true);
  _setOrientActive('tourBtn');
  const stream = $('#stream');
  stream.innerHTML = '<div class="empty">' + KNOT
    + '<h2>Building your guided tour…</h2><p>Ordering the codebase into a learning path.</p></div>';
  try {
    const t = await api('/v1/tour/' + encodeURIComponent(activeNs));
    const stops = [];
    (t.chapters || []).forEach(ch => (ch.stops || []).forEach(s => stops.push(Object.assign({ chapter: ch.title }, s))));
    if (!stops.length){ stream.innerHTML = emptyState('Tour unavailable', 'Not enough indexed code to build a tour yet.'); return; }
    _tour = { data: t, stops: stops, idx: 0 };
    renderTour();
  } catch (e){ stream.innerHTML = emptyState('Tour failed', e.message); }
}

function renderTour(){
  if (!_tour) return;
  const t = _tour.data, stops = _tour.stops, i = _tour.idx, s = stops[i];
  const pct = Math.round(((i + 1) / stops.length) * 100);
  const html = '<div class="tour">'
    + '<div class="tour-h"><div><strong>Guided tour</strong> · ' + esc(t.namespace || activeNs) + '</div>'
      + '<button class="tour-x" onclick="closeTour()">✕ exit tour</button></div>'
    + (t.overview ? '<p class="tour-ov">' + esc(t.overview) + '</p>' : '')
    + '<div class="tour-prog"><span style="width:' + pct + '%"></span></div>'
    + '<div class="tour-meta">Stop ' + (i + 1) + ' of ' + stops.length + ' · <b>' + esc(s.chapter) + '</b></div>'
    + '<div class="tour-stop">'
      + '<div class="tour-file">'
        + (s.is_entry ? '<span class="tour-badge">START HERE</span>' : '')
        + '<span class="tour-path openfile" data-openfile="' + esc(s.path) + '">' + esc(s.path) + '</span>'
        + (s.language ? '<span class="tour-lang">' + esc(s.language) + '</span>' : '')
        + '<span class="tour-lines">:' + s.line_start + '–' + s.line_end + '</span>'
      + '</div>'
      + (s.symbol ? '<div class="tour-sym">' + esc(s.symbol) + '</div>' : '')
      + (s.insight ? '<div class="tour-insight">' + esc(s.insight) + '</div>' : '')
      + '<div class="tour-why">' + esc(s.reason || '') + '</div>'
      + (s.note ? '<div class="tour-note"><b>Team note:</b> ' + esc(s.note) + '</div>' : '')
      + '<pre class="tour-code">' + highlight(s.excerpt || '') + '</pre>'
      + '<div class="tour-actions"><button class="pill" onclick="tourAsk()">Ask about this file</button></div>'
    + '</div>'
    + '<div class="tour-nav">'
      + '<button onclick="tourGo(-1)"' + (i === 0 ? ' disabled' : '') + '>← Prev</button>'
      + '<button onclick="tourGo(1)"' + (i === stops.length - 1 ? ' disabled' : '') + '>Next →</button>'
    + '</div>'
    + (t.wiring ? '<div class="tour-map"><div class="tour-map-h">How these files connect</div>' + renderWiring(t.wiring) + '</div>' : '')
    + '</div>';
  $('#stream').innerHTML = html;
  $('#stream').scrollTop = 0;
}
function tourGo(d){
  if (!_tour) return;
  _tour.idx = Math.max(0, Math.min(_tour.stops.length - 1, _tour.idx + d));
  renderTour();
}
function tourAsk(){
  if (!_tour) return;
  const s = _tour.stops[_tour.idx];
  $('#q').value = 'Explain ' + s.path + ' — what does it do and how does it fit into the project?';
  send();
}
async function closeTour(){
  _tour = null;
  _setOrientActive(null);
  const restored = activeNs && await restoreChatLog(activeNs);
  if (!restored) $('#stream').innerHTML = emptyState(activeNs || '', 'Tour closed — ask a question below.');
}

/* ---------- full project walkthrough ---------- */
let _walk = null;
let _walkPoll = null;
let _walkPhaseTimer = null;
const _WT_PHASES = ['Reading files','Mapping structure','Writing sections','Almost there'];
function _wtLoader(){
  const stages = _WT_PHASES.map((label, i) => {
    const activeClass = i === 0 ? ' active' : '';
    const conn = i < _WT_PHASES.length - 1
      ? '<div class="wt-conn" id="wtconn-' + i + '"></div>' : '';
    return '<div class="wt-stage' + activeClass + '" id="wts-' + i + '">'
      + '<div class="wt-stage-dot"></div>'
      + '<span class="wt-stage-label">' + esc(label) + '</span>'
      + '</div>' + conn;
  }).join('');
  return '<div class="wt-loading">'
    + '<svg class="wt-l-knot" viewBox="0 0 100 100" aria-hidden="true"><path class="knot" pathLength="1" d="M32 40 H68 A8 8 0 1 0 60 32 V68 A8 8 0 1 0 68 60 H32 A8 8 0 1 0 40 68 V32 A8 8 0 1 0 32 40 Z"/></svg>'
    + '<div class="wt-stages">' + stages + '</div>'
    + '<p class="wt-l-hint">Large repos may take a minute</p>'
    + '</div>';
}
function _startWtPhases(){
  let pi = 0;
  _walkPhaseTimer = setInterval(() => {
    if (pi >= _WT_PHASES.length - 1) return;
    const curr = $('#wts-' + pi);
    if (!curr){ clearInterval(_walkPhaseTimer); return; }
    curr.classList.remove('active');
    curr.classList.add('done');
    const conn = $('#wtconn-' + pi);
    if (conn) conn.classList.add('done');
    pi++;
    const next = $('#wts-' + pi);
    if (next) next.classList.add('active');
  }, 3200);
}
function _stopWtPhases(){ clearInterval(_walkPhaseTimer); _walkPhaseTimer = null; }
async function startWalkthrough(){
  if (!activeNs) return toast('Select a repo first', true);
  _setOrientActive('walkBtn');
  if (_walkPoll){ clearInterval(_walkPoll); _walkPoll = null; }
  _stopWtPhases();
  $('#stream').innerHTML = _wtLoader();
  _startWtPhases();
  try {
    const r = await api('/v1/walkthrough/' + encodeURIComponent(activeNs));
    if (r.status === 'ready'){ _stopWtPhases(); _walk = r; renderWalkthrough(); return; }
    await api('/v1/walkthrough/' + encodeURIComponent(activeNs), {});
    _walkPoll = setInterval(async () => {
      try {
        const p = await api('/v1/walkthrough/' + encodeURIComponent(activeNs));
        if (p.status === 'ready'){ clearInterval(_walkPoll); _walkPoll = null; _stopWtPhases(); _walk = p; renderWalkthrough(); }
      } catch (_){ /* keep polling */ }
    }, 4000);
  } catch (e){ _stopWtPhases(); $('#stream').innerHTML = emptyState('Walkthrough failed', e.message); }
}

function renderWalkthrough(){
  if (!_walk) return;
  const w = _walk;
  const toc = (w.sections || []).map((s, i) => '<a href="#wt' + i + '">' + esc(s.title) + '</a>').join('');
  const stack = (w.stack || []).map(s => '<span class="wt-chip">' + esc(s) + '</span>').join('');
  let secs = '';
  const _sections = w.sections || [];
  _sections.forEach((s, i) => {
    const takeaways = (s.takeaways && s.takeaways.length)
      ? '<div class="wt-takeaways"><div class="wt-tk-h">Key takeaways</div><ul>'
        + s.takeaways.map(t => '<li>' + esc(t) + '</li>').join('') + '</ul></div>'
      : '';
    const next = (i < _sections.length - 1)
      ? '<a class="wt-next" href="#wt' + (i + 1) + '">Next: ' + esc(_sections[i + 1].title) + ' →</a>'
      : '';
    secs += '<div class="wt-sec" id="wt' + i + '"><h3>' + esc(s.title) + '</h3>'
      + takeaways
      + '<div class="wt-body">' + md(s.body || '') + '</div>'
      + ((s.files && s.files.length)
          ? '<div class="wt-files"><b>Files:</b> ' + s.files.map(f => '<code class="openfile" data-openfile="' + esc(f) + '">' + esc(f) + '</code>').join(' ') + '</div>'
          : '')
      + next
      + '</div>';
  });
  const wire = w.wiring ? '<div class="wt-sec"><h3>How the files connect</h3>' + renderWiring(w.wiring) + '</div>' : '';
  const offline = (w.generated_with === 'structural')
    ? '<div class="wt-offline">Offline outline — set an LLM backend (e.g. <code>ONBOARDING_LLM_BACKEND=groq</code>) and re-open for the full plain-English write-up.</div>'
    : '';
  $('#stream').innerHTML = '<div class="wt">'
    + '<div class="wt-h"><strong>' + esc(w.title || ('Walkthrough — ' + activeNs)) + '</strong>'
    + '<div class="wt-actions">'
    + '<button class="wt-btn" onclick="downloadWalkthroughPdf(this)">⤓ Save as PDF</button>'
    + '<button class="wt-btn" onclick="downloadWalkthroughMd()">⤓ Markdown</button>'
    + '<button class="wt-btn" onclick="closeWalkthrough()">✕ close</button></div></div>'
    + (stack ? '<div class="wt-stack">' + stack + '</div>' : '')
    + offline
    + '<div class="wt-toc">' + toc + '</div>'
    + secs + wire + '</div>';
  $('#stream').scrollTop = 0;
}

function walkToMarkdown(){
  const w = _walk; let out = '# ' + (w.title || activeNs) + '\n\n';
  if (w.stack && w.stack.length) out += '**Stack:** ' + w.stack.join(', ') + '\n\n';
  (w.sections || []).forEach(s => {
    out += '## ' + s.title + '\n\n';
    if (s.takeaways && s.takeaways.length)
      out += '**Key takeaways:**\n' + s.takeaways.map(t => '- ' + t).join('\n') + '\n\n';
    out += (s.body || '') + '\n\n';
    if (s.files && s.files.length) out += '_Files: ' + s.files.join(', ') + '_\n\n';
  });
  return out;
}
function downloadWalkthroughMd(){
  if (!_walk) return;
  const blob = new Blob([walkToMarkdown()], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (activeNs || 'walkthrough') + '-walkthrough.md';
  a.click(); URL.revokeObjectURL(a.href);
}
async function downloadWalkthroughPdf(btn){
  if (!_walk || !activeNs) return;
  const label = btn ? btn.textContent : '';
  if (btn){ btn.disabled = true; btn.textContent = '⤓ Building PDF…'; }
  try {
    const res = await fetch('/v1/walkthrough/' + encodeURIComponent(activeNs) + '/pdf',
      { headers: { 'Authorization': 'Bearer ' + $('#key').value.trim() } });
    if (!res.ok){
      toast(res.status === 404 ? 'Generate the walkthrough first' : 'Could not build the PDF', true);
      return;
    }
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = activeNs + '-walkthrough.pdf';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(a.href);
  } catch (e){
    toast('Could not download the PDF', true);
  } finally {
    if (btn){ btn.disabled = false; btn.textContent = label; }
  }
}
async function closeWalkthrough(){
  if (_walkPoll){ clearInterval(_walkPoll); _walkPoll = null; }
  _stopWtPhases();
  _setOrientActive(null);
  _walk = null;
  const restored = activeNs && await restoreChatLog(activeNs);
  if (!restored) $('#stream').innerHTML = emptyState(activeNs || '', 'Walkthrough closed — open it again any time from the left.');
}

const TOOL_ICON = {search_code:'🔍',read_file:'📄',find_files:'📁',grep_code:'🔎',get_file_structure:'🗂'};
const TOOL_LABEL = {search_code:'search',read_file:'read file',find_files:'find files',grep_code:'grep',get_file_structure:'file structure'};

function _fmtChars(n){return n>=1000?(n/1000).toFixed(1)+'k':n+'';}

async function send(){
  const q = $('#q').value.trim();
  if (!q) return;
  if (!activeNs) return toast('Ingest or select a repo first', true);
  $('#q').value = '';
  // If tour is active, clear the tour UI but keep _tour state so we can return to it
  if (_tour) { const tourEl = $('#stream').querySelector('.tour'); if (tourEl) tourEl.remove(); }
  addTurn('<div class="user-bubble">' + esc(q) + '</div>' + USER_AV_EL, 'user');
  const KNOT_SMALL = '<svg class="think-knot" viewBox="0 0 100 100" aria-hidden="true"><path class="knot" pathLength="1" d="M32 40 H68 A8 8 0 1 0 60 32 V68 A8 8 0 1 0 68 60 H32 A8 8 0 1 0 40 68 V32 A8 8 0 1 0 32 40 Z"/></svg>';
  const t = addTurn(BOT_AV_EL + '<div class="bot-card"><div class="thinking">'
    + KNOT_SMALL + '<div class="think-lines"><div class="think-line">Thinking…</div></div></div></div>', 'bot');
  const tlines = t.querySelector('.think-lines');

  function addStep(text){
    // Replace single line — re-create to retrigger the fade-in animation
    tlines.innerHTML = '<div class="think-line">' + esc(text) + '</div>';
  }

  try {
    const payload = history.slice(-12).map(h => ({ role: h.role, content: String(h.content).slice(0, 1000) }));
    const askBody = { namespace: activeNs, question: q, history: payload };
    const key = $('#key').value.trim();

    const resp = await fetch('/v1/ask/stream', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify(askBody),
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '', d = null;
    outer: while(true){
      const {done,value} = await reader.read();
      if(done) break;
      buf += dec.decode(value,{stream:true});
      const lines = buf.split('\n'); buf = lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        let ev; try{ ev=JSON.parse(line.slice(6)); }catch{ continue; }
        if(ev.type==='thinking'){
          addStep('Thinking…');
        } else if(ev.type==='composing'){
          addStep('Composing answer…');
        } else if(ev.type==='tool_call'){
          const arg = (ev.arg||'').slice(0,48);
          const labels = {
            search_code: arg ? 'Searching — '+arg : 'Searching codebase',
            read_file:   arg ? 'Reading — '+arg.split('/').pop() : 'Reading file',
            find_files:  arg ? 'Finding files — '+arg : 'Finding files',
            grep_code:   arg ? 'Grepping — '+arg : 'Grepping code',
            get_file_structure: 'Mapping project structure',
          };
          addStep(labels[ev.tool] || ev.tool);
        } else if(ev.type==='tool_result' && !ev.ok){
          addStep('No results — refining search');
        } else if(ev.type==='error_iter'){
          addStep('Retrying with a different approach');
        } else if(ev.type==='error'){
          throw new Error(ev.message||'Agent error');
        } else if(ev.type==='done'){
          d = ev; break outer;
        }
      }
    }
    if(!d) throw new Error('No response received');

    history.push({ role: 'user', content: q });
    history.push({ role: 'assistant', content: d.answer });
    const ms = d.trace && d.trace.duration_ms ? (d.trace.duration_ms / 1000).toFixed(1) + 's' : '';
    const model = d.trace && d.trace.model_used ? d.trace.model_used : '';
    t.innerHTML = BOT_AV_EL + '<div class="bot-card"><div class="answer"></div></div>';
    const card = t.querySelector('.bot-card');
    const _sm = {}; (d.sources || []).forEach(s => { _sm[s.path] = s; }); t._srcMap = _sm;
    const metaParts = [
      (d.trace && d.trace.strategy === 'agent' && d.trace.grounding
        ? '<span class="chip info">⚡ ' + (d.trace.grounding.tool_calls||0) + ' calls · ' + (d.trace.grounding.iterations||0) + ' steps</span>'
        : ''),
      (model ? '<span>' + esc(model) + '</span>' : ''),
      (ms ? '<span>' + ms + '</span>' : ''),
    ].filter(Boolean).join('');
    const tail = renderWiring(d.wiring)
      + renderSources(d)
      + (metaParts ? '<div class="ans-meta">' + metaParts + '</div>' : '');
    typeInto(card.querySelector('.answer'), md(d.answer), () => {
      card.insertAdjacentHTML('beforeend', tail);
      addCopyButton(card, d.answer);
      if (_tour) {
        card.insertAdjacentHTML('beforeend',
          '<div class="tour-resume"><button onclick="renderTour()">↩ Back to tour · stop '
          + (_tour.idx + 1) + ' of ' + _tour.stops.length + '</button></div>');
      }
      scrollBottom();
    });
  } catch (e){
    t.innerHTML = BOT_AV_EL + '<div class="bot-card"><div class="answer" style="color:var(--bad);padding:14px 20px">⚠ ' + esc(e.message) + '</div></div>';
  }
}

$('#send').onclick = send;
$('#tourBtn').onclick = startTour;
$('#walkBtn').onclick = startWalkthrough;
$('#q').addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFileViewer(); });
// any element tagged data-openfile (tour stop path, walkthrough file chip) opens the full file
$('#stream').addEventListener('click', e => {
  const el = e.target.closest('[data-openfile]');
  if (el){ e.preventDefault(); openFileViewer(el.getAttribute('data-openfile')); }
});
$('#clearBtn').onclick = async () => {
  history = [];
  if (activeNs){ try { await api('/v1/chat/' + encodeURIComponent(activeNs), undefined, 'DELETE'); } catch {} }
  $('#stream').innerHTML = emptyState('Log cleared', 'Context history wiped — server side too. Ask away.');
};
$('#resyncBtn').onclick = async () => {
  if (!activeNs) return toast('Select a repo first', true);
  const btn = $('#resyncBtn'); const orig = btn.textContent;
  btn.disabled = true; btn.textContent = '↻ Re-syncing…';
  try {
    const r = await api('/v1/resync/' + encodeURIComponent(activeNs), {});
    toast('Re-syncing "' + activeNs + '" (' + (r.mode || '') + ') — fresh commits & code will appear shortly');
  } catch (e){ toast('Re-sync failed: ' + e.message, true); }
  finally { btn.disabled = false; btn.textContent = orig; }
};

/* ---------- theme ---------- */
const MOON_SVG = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
const SUN_SVG  = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('cortex-theme', theme);
  const icon = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  if (icon) icon.outerHTML = (theme === 'dark' ? SUN_SVG : MOON_SVG).replace('<svg ', '<svg id="themeIcon" ');
  if (label) label.textContent = theme === 'dark' ? 'Light' : 'Dark';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
/* apply saved preference on load (default: dark) */
applyTheme(localStorage.getItem('cortex-theme') || 'dark');
