<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cortex — Codebase Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    /* ---- PREMIUM DARK THEME ---- neutral charcoal base + violet accent */
    --bg:#111111; --bg-2:#181818; --card:#1f1f1f; --inset:#0d0d0d; --code-bg:#0a0a0a;
    --line:#2c2c2c; --line-strong:#383838;
    --text:#f0f0f0; --body:#c4c4c4; --muted:#888888; --faint:#555555;
    /* violet/indigo accent — #7c5cfc core, deep #6644e8, light ink #a78bfa */
    --brand:#7c5cfc; --brand-deep:#6644e8; --brand-ink:#a78bfa;
    --brand-2:#8b6ffc;
    --brand-soft:rgba(124,92,252,.13); --brand-ring:rgba(124,92,252,.38);
    --grad:linear-gradient(120deg,#9d7dfc,#7c5cfc 55%,#6644e8);
    --grad2:linear-gradient(120deg,#8b6ffc,#6644e8);
    /* multi-hue accent system */
    --amber:#f59e0b; --coral:#f97316; --teal:#14b8a6; --cyan:#06b6d4; --blue:#3b82f6;
    --rose:#f43f5e; --emerald:#10b981; --gold:#eab308;
    --ok:#22c55e; --ok-soft:rgba(34,197,94,.14); --bad:#ef4444; --bad-soft:rgba(239,68,68,.15);
    --shadow-sm:0 1px 3px rgba(0,0,0,.6);
    --shadow-md:0 2px 8px rgba(0,0,0,.55), 0 16px 38px rgba(0,0,0,.6);
    --shadow-lg:0 10px 28px rgba(0,0,0,.65), 0 30px 70px rgba(0,0,0,.75);
    --glow:0 0 0 1px rgba(124,92,252,.25), 0 8px 30px rgba(124,92,252,.16);
    --f-ui:'Plus Jakarta Sans',-apple-system,sans-serif;
    --f-read:'Source Serif 4',Georgia,serif;
    --f-mono:'JetBrains Mono',ui-monospace,Consolas,monospace;
    --fv-w:min(560px,42vw);
  }
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  body{
    color:var(--text); font-family:var(--f-ui);
    font-size:14px; line-height:1.6; display:flex; flex-direction:column; overflow:hidden;
    -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(900px 400px at 0% 0%, rgba(124,92,252,.04), transparent 55%),
      var(--bg);
  }
  #app{display:flex;flex-direction:column;height:100%}

  ::selection{background:rgba(124,92,252,.28)}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#383838;border-radius:99px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:#484848}
  ::-webkit-scrollbar-track{background:transparent}
  aside::-webkit-scrollbar-thumb,#msgs::-webkit-scrollbar-thumb{border-color:transparent}

  /* interconnected knot mark (the "place of interest" symbol) */
  .knot{fill:none;stroke:url(#g);stroke-linecap:round;stroke-linejoin:round;stroke-width:6.5}
  .mark .knotsvg{width:38px;height:38px}
  .glyph .knot{stroke-dasharray:1;stroke-dashoffset:1;animation:knotdraw 2s cubic-bezier(.4,0,.2,1) forwards}

  /* ---------- header ---------- */
  header{
    display:flex; align-items:center; gap:13px; padding:0 28px; height:64px; flex:none;
    background:var(--bg-2);
    border-bottom:1px solid var(--line); position:relative; z-index:5;
  }
  header::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;
    background:linear-gradient(90deg,transparent,var(--brand),transparent);opacity:.35}
  .mark{width:36px;height:36px;flex:none;display:grid;place-items:center}
  .mark .knot{stroke:var(--brand)}
  .brand{min-width:0;display:flex;align-items:baseline;gap:12px}
  .brand h1{font-size:18px;font-weight:800;letter-spacing:-.02em;color:var(--brand-ink)}
  .brand .tag{
    font-size:12.5px;color:var(--muted);font-weight:500;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .sys{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted);
    font-weight:600;font-family:var(--f-mono);padding:5px 12px;border-radius:999px;
    background:rgba(255,255,255,.04);border:1px solid var(--line)}
  .sys .dot{width:7px;height:7px;border-radius:50%;background:var(--faint)}
  .sys .dot.on{background:var(--brand);box-shadow:none}

  /* ---------- ingest bar ---------- */
  .bar{
    display:flex; align-items:center; gap:10px; flex:none; height:58px;
    background:var(--bg-2); border-bottom:1px solid var(--line); padding:0 24px;
  }
  .bar-toggle{
    display:flex; gap:2px; background:var(--inset); border:1px solid var(--line);
    border-radius:8px; padding:3px; flex:none;
  }
  .bar-tab{
    padding:5px 13px; font-size:12px; font-weight:600; cursor:pointer; border:none;
    background:transparent; color:var(--muted); font-family:var(--f-ui); border-radius:6px;
    transition:all .15s; white-space:nowrap;
  }
  .bar-tab:hover{color:var(--text)}
  .bar-tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.4)}
  .bar-form{display:flex;gap:10px;align-items:center;flex:1}
  .bar-pane{display:none}.bar-pane.active{display:contents}
  .field{display:flex;flex-direction:column;gap:5px}
  .field.grow{flex:1;min-width:200px}
  label{font-size:11.5px;font-weight:600;color:var(--muted)}
  .bar-url-wrap{position:relative;display:flex;align-items:center}
  .bar-url-wrap input{padding-left:30px;width:100%}
  .bar-url-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;line-height:1}
  input{
    background:var(--inset); border:1px solid var(--line-strong); border-radius:8px;
    color:var(--text); font-family:var(--f-mono); font-size:12.5px;
    padding:8px 12px; outline:none; transition:border-color .15s, box-shadow .15s;
  }
  input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-ring)}
  input::placeholder{color:var(--faint)}
  .btn{
    border:0; border-radius:9px; cursor:pointer; font-weight:700; font-size:13px;
    font-family:var(--f-ui); padding:9px 22px; color:#fff;
    background:var(--brand); border:1px solid var(--brand-deep);
    transition:background .15s, color .15s, opacity .15s;
  }
  .btn:hover{background:var(--brand-deep);color:#fff}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

  /* ---------- layout ---------- */
  main{flex:1;display:grid;grid-template-columns:300px 1fr;grid-template-rows:minmax(0,1fr);min-height:0}

  /* ---------- sidebar ---------- */
  aside{
    border-right:1px solid var(--line); overflow-y:auto; padding:22px 18px 32px;
    background:var(--bg); min-height:0;
  }
  .sec{margin-bottom:28px}
  .sec-h{
    display:flex; align-items:center; gap:8px; margin-bottom:10px;
    font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted);
  }
  .ns{
    display:flex; gap:10px; padding:10px 12px; margin-bottom:6px; cursor:pointer;
    border:1px solid transparent; border-radius:10px;
    transition:background .15s, border-color .15s;
  }
  .ns:hover{background:rgba(255,255,255,.04)}
  .ns.active{background:var(--card);border-color:var(--line);box-shadow:var(--shadow-sm)}
  .ns.active .nm{color:var(--brand-ink)}
  .ns .idx{width:9px;height:9px;border-radius:50%;background:var(--faint);flex:none;margin-top:5px;transition:background .2s}
  .ns.active .idx{background:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .ns .nm{font-weight:700;font-size:13px;word-break:break-all}
  .ns .meta{font-size:11px;color:var(--muted);margin-top:2px}
  .ns .stats{font-size:10.5px;color:var(--faint);margin-top:1px;font-family:var(--f-mono)}
  .empty-side{font-size:12.5px;color:var(--muted)}

  .pill{
    display:flex; align-items:flex-start; gap:8px; width:100%; text-align:left; cursor:pointer; margin-bottom:4px;
    background:transparent; border:none;
    color:var(--muted); font-size:12.5px; font-weight:500; font-family:var(--f-ui); padding:6px 4px;
    transition:color .12s;
  }
  .pill::before{content:"→";color:var(--faint);flex:none;font-size:12px;margin-top:1px}
  .pill:hover{color:var(--text)}

  .teach-intro{font-size:11.5px;color:var(--muted);margin-bottom:10px;line-height:1.45}
  .gap{border:1px solid var(--line);border-radius:10px;background:var(--card);padding:10px 12px;margin-bottom:8px;box-shadow:var(--shadow-sm)}
  .gap .q{font-size:12.5px;color:var(--text);font-weight:600;margin-bottom:7px;line-height:1.4}
  .gap .q code{font-family:var(--f-mono);font-size:11.5px;background:var(--code-bg);border:1px solid var(--line);border-radius:4px;padding:0 4px;color:var(--brand-ink)}
  .gap textarea{
    width:100%;resize:vertical;min-height:46px;font-family:var(--f-ui);font-size:12.5px;
    border:1px solid var(--line-strong);border-radius:7px;padding:7px 9px;outline:none;color:var(--text);
    background:var(--inset);
  }
  .gap textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-ring)}
  .gap .row{display:flex;gap:6px;margin-top:6px}
  .gap .save{
    border:0;border-radius:6px;background:var(--brand);color:#fff;font-weight:600;font-size:11.5px;
    padding:5px 12px;cursor:pointer;font-family:var(--f-ui);
  }
  .gap .save:hover{background:var(--brand-deep)}
  .gap.done{opacity:.6}
  .gap.done .q::after{content:" ✓ saved";color:var(--brand-ink);font-weight:700;font-size:11px}

  /* ---------- chat ---------- */
  .chat{display:flex;flex-direction:column;min-width:0;min-height:0;background:var(--bg-2)}
  .chat-top{
    flex:none; display:flex; align-items:center; gap:8px; padding:10px 32px;
    border-bottom:1px solid var(--line); font-size:12.5px; color:var(--muted); background:var(--card);
  }
  .chat-top .ns-now{color:var(--text);font-weight:700}
  .chat-top .spacer{margin-left:auto}
  .chat-top button{
    background:var(--card);border:1px solid var(--line-strong);border-radius:7px;color:var(--muted);
    font-size:12px;font-weight:600;padding:4px 12px;cursor:pointer;font-family:var(--f-ui);
    transition:color .12s,border-color .12s;
  }
  .chat-top button:hover{color:var(--bad);border-color:var(--bad)}
  .chat-top button.resync:hover{color:var(--brand-ink);border-color:var(--brand)}
  .chat-top button:disabled{opacity:.5;cursor:default}

  #msgs{flex:1;min-height:0;overflow-y:auto;padding:24px 20px 20px;scroll-behavior:smooth}
  .stream{max-width:100%;margin:0}

  /* empty state — compact */
  .empty{margin-top:10vh;text-align:center;padding:0 24px}
  .empty h2{font-size:14px;font-weight:600;color:var(--text);margin:0 0 5px}
  .empty p{font-size:12.5px;color:var(--muted);margin:0}
  .q-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:18px auto 0;max-width:520px}
  .q-chip{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:7px 15px;
    font-size:12.5px;color:var(--body);cursor:pointer;transition:border-color .15s,color .15s,background .15s;
    font-family:var(--f-ui)}
  .q-chip:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
  @keyframes knotdraw{to{stroke-dashoffset:0}}
  @keyframes knotloop{0%{stroke-dashoffset:1}55%{stroke-dashoffset:0}100%{stroke-dashoffset:-1}}
  @keyframes tlfade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  /* interactive ingest panel */
  .ingesting{margin-top:8vh;text-align:center;color:var(--muted)}
  .ingesting .glyph{width:44px;height:44px;margin:0 auto 10px}
  .ingesting h2{font-family:var(--f-read);font-weight:600;font-size:18px;color:var(--text);margin:4px 0 16px}
  .isteps{display:flex;flex-direction:column;gap:0;text-align:left;max-width:280px;margin:0 auto}
  .istep{display:flex;gap:11px;align-items:flex-start}
  .istep-left{display:flex;flex-direction:column;align-items:center;flex:none;width:10px}
  .idot{
    width:9px;height:9px;border-radius:50%;border:1.5px solid var(--line-strong);
    background:transparent;flex:none;margin-top:4px;
    transition:border-color .3s,background .3s,box-shadow .3s;z-index:1;
  }
  .istep-line{width:1.5px;min-height:13px;flex:1;background:var(--line);margin:2px auto;transition:background .4s}
  .istep:last-child .istep-line{visibility:hidden}
  .istep-body{padding:0 0 14px}
  .istep-label{font-size:12.5px;color:var(--faint);transition:color .25s;display:block;line-height:1.3}
  .istep.active .idot{border-color:var(--brand);background:var(--brand);box-shadow:0 0 0 3px var(--brand-soft);animation:step-pulse 2s ease infinite}
  .istep.active .istep-label{color:var(--text);font-weight:600}
  .istep.done .idot{border-color:var(--brand);background:var(--brand);box-shadow:none;animation:none}
  .istep.done .istep-label{color:var(--brand-ink)}
  .istep.done .istep-line{background:var(--brand)}
  .imeta{font-size:12px;max-width:380px;margin:14px auto 0;color:var(--muted)}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes step-pulse{
    0%,100%{box-shadow:0 0 0 3px rgba(124,92,252,.22)}
    50%{box-shadow:0 0 0 6px rgba(124,92,252,.05)}
  }

  .empty h2{font-family:var(--f-read);font-weight:600;font-size:26px;color:var(--text);margin:10px 0 8px;letter-spacing:-.01em}
  .empty p{font-size:14px;max-width:460px;margin:0 auto;color:var(--muted)}
  .empty .kbd{
    font-family:var(--f-mono);font-size:11px;background:var(--card);border:1px solid var(--line-strong);
    border-bottom-width:2px;border-radius:6px;padding:1px 7px;color:var(--body);
  }

  .turn{margin-bottom:20px;animation:msg .3s cubic-bezier(.2,.7,.2,1) both}

  /* ── user bubble (right-aligned) ── */
  .turn.user{display:flex;align-items:flex-start;justify-content:flex-end;gap:10px}
  .user-bubble{
    max-width:68%; background:#272727; border:1px solid #333;
    border-radius:16px; border-bottom-right-radius:4px;
    padding:11px 16px; font-size:14.5px; font-weight:500; color:var(--text); line-height:1.55;
  }
  .user-av{
    width:28px;height:28px;flex:none;border-radius:8px;margin-top:2px;
    background:#2e2e2e;border:1px solid #3a3a3a;display:grid;place-items:center;
  }
  .user-av svg{display:block}

  /* ── bot message (left-aligned, avatar + card) ── */
  .turn.bot{display:flex;align-items:flex-start;gap:10px;background:transparent;border:none;box-shadow:none}
  .turn.bot::before{display:none}
  .bot-av{
    width:30px;height:30px;flex:none;border-radius:50%;margin-top:3px;
    background:linear-gradient(140deg,#9d78ff 0%,#6d28d9 100%);
    display:grid;place-items:center;
    box-shadow:0 2px 10px rgba(109,40,217,.4),0 0 0 1px rgba(255,255,255,.08);
  }
  .bot-av svg{display:block}
  .bot-card{
    flex:1;min-width:0;background:var(--card);border:1px solid var(--line);
    border-radius:14px;border-top-left-radius:4px;overflow:hidden;position:relative;
    transition:border-color .2s;
  }
  .bot-card:hover{border-color:#444}
  .answer{
    padding:14px 20px 14px; font-family:var(--f-read); font-size:15px; line-height:1.78;
    color:var(--body);
  }
  .answer.typing::after{
    content:""; display:inline-block; width:2px; height:16px; background:var(--brand);
    margin-left:3px; vertical-align:-2px; animation:blink .85s steps(1) infinite;
  }
  .answer code{
    font-family:var(--f-mono); font-size:12.5px; background:var(--code-bg);
    border:1px solid var(--line); border-radius:5px; padding:1px 6px; color:var(--brand-ink);
  }
  .answer strong{color:var(--text);font-weight:600}
  .answer .li{display:block;padding-left:16px;text-indent:-16px;margin:3px 0}
  .ans-meta{
    display:flex; align-items:center; gap:12px; padding:8px 22px; flex-wrap:wrap;
    border-top:1px solid var(--line); font-size:11px; color:var(--muted); background:var(--bg-2);
    font-family:var(--f-mono);
  }
  .chip{
    display:inline-flex; align-items:center; gap:5px; border-radius:999px; padding:2px 10px;
    font-size:11px; letter-spacing:.01em; font-weight:700; font-family:var(--f-ui);
  }
  .chip.ok{color:#22c55e;background:rgba(34,197,94,.13)}
  .chip.bad{color:var(--bad);background:var(--bad-soft)}
  .chip.info{color:#6366f1;background:rgba(99,102,241,.12)}
  .chip.cited{color:var(--brand-ink);background:var(--brand-soft);padding:1px 9px;font-weight:600}

  /* source panel — single file viewer, populated on wiring node click */
  .src-panel{border-top:1px solid var(--line);background:var(--inset)}
  .src-panel .sp-head{
    display:flex; align-items:center; gap:9px; padding:8px 26px;
    font-family:var(--f-mono); font-size:11.5px; min-width:0;
  }
  .src-panel .sp-path{color:var(--body);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:rtl;text-align:left}
  .src-panel .sp-path bdi{unicode-bidi:plaintext}
  .src-panel .lines{color:var(--faint);flex:none}
  .src-panel .sym{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:230px;font-size:10.5px}
  .src-panel .right{margin-left:auto;display:flex;align-items:center;gap:8px;flex:none}
  .meter{width:38px;height:3px;border-radius:2px;background:var(--line-strong);overflow:hidden}
  .meter i{display:block;height:100%;background:var(--brand);border-radius:2px}
  .src-panel .sp-close{
    border:none;background:transparent;color:var(--faint);cursor:pointer;
    padding:2px 7px;font-size:13px;line-height:1;flex:none;margin-left:4px;border-radius:5px;
  }
  .src-panel .sp-close:hover{color:var(--fg);background:rgba(255,255,255,.06)}
  .src-panel pre{
    margin:0 26px 14px; padding:12px 14px; overflow:auto; max-height:280px;
    background:var(--code-bg); border:1px solid var(--line); border-radius:9px;
    font-family:var(--f-mono); font-size:11px; line-height:1.6; color:var(--body); white-space:pre-wrap;
    animation:reveal .22s ease both;
  }
  .src-panel .sp-empty{padding:12px 26px 16px;color:var(--muted);font-style:italic;font-size:12px}
  /* active wiring node gets a brand-color border glow */
  svg.wire .wnode.active .wn{stroke:var(--brand);stroke-width:2}
  /* guided tour */
  .orient-btns{display:flex;flex-direction:column;gap:6px}
  .orient-btn{
    display:flex;align-items:center;gap:9px;width:100%;text-align:left;cursor:pointer;
    border-radius:9px;font-family:var(--f-ui);font-weight:600;font-size:13px;
    padding:10px 14px;transition:all .14s;border:1px solid transparent;
  }
  .orient-icon{font-size:14px;flex:none;width:18px;text-align:center}
  .orient-primary{background:var(--brand);color:#fff;border-color:var(--brand-deep)}
  .orient-primary:hover{background:var(--brand-deep)}
  .orient-ghost{background:var(--card);color:var(--body);border-color:var(--line-strong)}
  .orient-ghost:hover{border-color:var(--brand);color:var(--text)}
  /* walkthrough loading — pipeline stages */
  .wt-loading{display:flex;flex-direction:column;align-items:center;padding:10vh 0 0;gap:0}
  .wt-l-knot{width:40px;height:40px;margin-bottom:44px;opacity:.85}
  .wt-l-knot .knot{animation:knotloop 2s cubic-bezier(.45,.05,.55,.95) infinite;stroke-width:5}
  .wt-stages{display:flex;flex-direction:column;align-items:flex-start;gap:0}
  .wt-stage{display:flex;align-items:center;gap:14px}
  .wt-stage-dot{width:14px;height:14px;border-radius:50%;flex:none;
    border:2px solid var(--line-strong);background:var(--bg);
    transition:border-color .35s,background .35s,box-shadow .35s}
  .wt-stage-label{font-family:var(--f-ui);font-size:13px;font-weight:500;
    color:var(--muted);transition:color .3s,font-weight .3s;white-space:nowrap}
  .wt-conn{width:1px;height:22px;background:var(--line);margin:3px 0 3px 6px;
    transition:background .45s}
  .wt-stage.active .wt-stage-dot{border-color:var(--brand);background:var(--brand);
    animation:wtdotpulse 1.8s ease-in-out infinite}
  .wt-stage.active .wt-stage-label{color:var(--text);font-weight:600}
  .wt-stage.done .wt-stage-dot{border-color:var(--brand);background:var(--brand);
    box-shadow:none;animation:none}
  .wt-conn.done{background:var(--brand)}
  @keyframes wtdotpulse{
    0%,100%{box-shadow:0 0 0 3px var(--brand-soft)}
    50%{box-shadow:0 0 0 7px var(--brand-soft)}
  }
  .wt-l-hint{margin-top:40px;font-size:11px;color:var(--muted);font-family:var(--f-mono);
    opacity:.45;letter-spacing:.04em}

  /* full project walkthrough */
  .wt{max-width:860px;margin:0 auto;padding:8px 4px 60px}
  .wt-h{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  .wt-h strong{color:var(--text);font-size:18px}
  .wt-actions{display:flex;gap:8px;flex-wrap:wrap}
  .wt-btn{background:var(--card);border:1px solid var(--line-strong);color:var(--text);border-radius:7px;
    font-family:var(--f-ui);font-size:11.5px;font-weight:600;padding:5px 11px;cursor:pointer;transition:.12s}
  .wt-btn:hover{border-color:var(--brand);color:var(--brand-ink)}
  .wt-stack{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 14px}
  .wt-chip{background:var(--brand-soft);color:var(--brand-ink);font-size:11px;padding:3px 9px;border-radius:6px}
  .wt-offline{font-size:12px;color:var(--muted);background:var(--inset);border:1px solid var(--line);
    border-radius:8px;padding:8px 12px;margin:0 0 14px;line-height:1.5}
  .wt-offline code{font-family:var(--f-mono);font-size:11px;background:var(--code-bg);border:1px solid var(--line);border-radius:4px;padding:0 4px;color:var(--brand-ink)}
  .wt-toc{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--line)}
  .wt-toc a{font-size:11.5px;color:var(--muted);background:var(--card);border:1px solid var(--line);
    border-radius:6px;padding:4px 9px;text-decoration:none}
  .wt-toc a:hover{color:var(--brand-ink);border-color:var(--brand)}
  .wt-sec{margin:0 0 26px;scroll-margin-top:14px}
  .wt-sec h3{font-family:var(--f-read);font-weight:600;font-size:20px;color:var(--text);margin:0 0 12px;
    padding-bottom:8px;border-bottom:1px solid var(--line)}
  .wt-takeaways{background:var(--brand-soft);border:1px solid var(--line);border-radius:9px;
    padding:12px 16px 12px;margin:0 0 16px}
  .wt-tk-h{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    color:var(--brand-ink);margin-bottom:6px}
  .wt-takeaways ul{margin:0;padding-left:18px}
  .wt-takeaways li{font-size:14px;line-height:1.6;color:var(--text);margin:3px 0}
  .wt-next{display:inline-block;margin-top:16px;font-size:13.5px;font-weight:600;color:var(--brand-ink);
    text-decoration:none;border:1px solid var(--line);border-radius:7px;padding:7px 13px}
  .wt-next:hover{background:var(--brand-soft);border-color:var(--brand)}
  .wt-body{font-size:15px;line-height:1.75;color:var(--body)}
  .wt-body code{font-family:var(--f-mono);font-size:13px;background:var(--code-bg);border:1px solid var(--line);
    border-radius:4px;padding:1px 6px;color:var(--brand-ink)}
  .wt-body .li{display:block;margin:4px 0}
  .wt-files{margin-top:13px;font-size:13px;color:var(--muted);line-height:1.7}
  .wt-files b{color:var(--body);font-weight:600}
  .wt-files code{font-family:var(--f-mono);background:var(--inset);border:1px solid var(--line);border-radius:4px;padding:1px 6px;margin:0 2px;color:var(--text);font-size:12.5px}
  .openfile{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px}
  .openfile:hover{color:var(--brand-ink)}
  /* full-file viewer modal */
  .fv-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:none;
    align-items:center;justify-content:center;padding:24px}
  .fv-overlay.open{display:flex}
  .fv-modal{background:var(--card);border:1px solid var(--line-strong);border-radius:18px;
    width:min(940px,95vw);max-height:88vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);overflow:hidden}
  .fv-head{display:flex;align-items:center;gap:9px;padding:11px 15px;border-bottom:1px solid var(--line);background:var(--bg-2)}
  .fv-head .fv-path{flex:1;min-width:0;font-family:var(--f-mono);font-size:12.5px;color:var(--text);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:rtl;text-align:left}
  .fv-x{background:transparent;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:2px 8px;border-radius:6px;flex:none}
  .fv-x:hover{color:var(--text);background:rgba(255,255,255,.06)}
  .fv-body{overflow:auto;padding:12px}
  .fv-meta{font-size:11px;color:var(--muted);margin-bottom:10px}
  .fv-trunc{color:var(--brand-ink)}
  .fv-code{
    margin:0;font-family:var(--f-mono);font-size:12px;line-height:1.62;
    color:var(--body);white-space:pre;tab-size:4;
    background:var(--code-bg);border:1px solid var(--line);
    border-radius:12px;padding:14px 18px;
    overflow-x:auto;overflow-y:visible;min-width:0;
  }
  .fv-loading{color:var(--muted);font-size:13px;padding:26px;text-align:center;font-style:italic}
  /* docked-right mode (wide screens): the file sits beside the chat instead of
     over it; #app.fv-docked shrinks the chat grid so nothing is hidden */
  .fv-overlay.fv-dock{background:transparent;inset:64px 0 0 auto;width:var(--fv-w);padding:0;align-items:stretch;justify-content:flex-end}
  .fv-overlay.fv-dock .fv-modal{width:100%;height:100%;max-height:none;border-radius:0;border:none;border-left:1px solid var(--line-strong);box-shadow:none}
  #app.fv-docked main{padding-right:var(--fv-w);transition:padding-right .18s ease}
  .tour{max-width:820px;margin:0 auto;padding:8px 4px 40px}
  .tour-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .tour-h strong{color:var(--text);font-size:16px}
  .tour-x{background:var(--card);border:1px solid var(--line-strong);color:var(--muted);
    border-radius:7px;font-family:var(--f-ui);font-size:11.5px;padding:5px 10px;cursor:pointer}
  .tour-x:hover{color:var(--text);border-color:var(--brand)}
  .tour-ov{font-size:13px;color:var(--body);line-height:1.6;background:var(--card);
    border:1px solid var(--line);border-radius:10px;padding:11px 14px;margin-bottom:14px}
  .tour-prog{height:5px;border-radius:3px;background:var(--line-strong);overflow:hidden;margin-bottom:8px}
  .tour-prog span{display:block;height:100%;background:var(--brand);border-radius:3px;transition:width .3s}
  .tour-meta{font-size:12px;color:var(--muted);margin-bottom:14px}
  .tour-meta b{color:var(--brand-ink)}
  .tour-stop{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .tour-file{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-family:var(--f-mono);font-size:14.5px}
  .tour-badge{background:var(--brand-soft);color:var(--brand-ink);font-family:var(--f-ui);
    font-size:11px;font-weight:800;letter-spacing:.06em;padding:4px 10px;border-radius:6px}
  .tour-path{color:var(--text);font-weight:600;font-size:14px}
  .tour-lang{color:var(--muted);font-size:13px}
  .tour-lines{color:var(--faint);font-size:13px}
  .tour-sym{font-family:var(--f-mono);font-size:13px;color:var(--muted);margin-top:7px}
  .tour-insight{font-size:15px;color:var(--text);margin:12px 0 0;line-height:1.6;font-weight:500;
    background:var(--brand-soft);border-left:3px solid var(--brand);border-radius:0 7px 7px 0;padding:11px 15px}
  .tour-why{font-size:13px;color:var(--muted);margin:9px 0 0;line-height:1.55}
  .tour-note{font-size:14px;color:var(--body);background:var(--inset);border-left:2px solid var(--brand);
    border-radius:0;padding:10px 14px;margin-top:12px;line-height:1.6}
  .tour-note b{color:var(--brand-ink)}
  .tour-code{margin:14px 0 0;padding:14px 16px;overflow:auto;max-height:340px;
    background:var(--code-bg);border:1px solid var(--line);border-radius:9px;
    font-family:var(--f-mono);font-size:13px;line-height:1.65;color:var(--body);white-space:pre-wrap}
  .tour-actions{margin-top:12px}
  .tour-nav{display:flex;gap:10px;margin-top:16px}
  .tour-nav button{flex:1;background:var(--card);border:1px solid var(--line-strong);color:var(--text);
    border-radius:9px;font-family:var(--f-ui);font-weight:600;font-size:13px;padding:10px;cursor:pointer;transition:.14s}
  .tour-nav button:hover:not(:disabled){border-color:var(--brand);color:var(--brand-ink)}
  .tour-nav button:disabled{opacity:.4;cursor:default}
  .tour-resume{margin-top:14px}
  .tour-resume button{background:var(--inset);border:1px solid var(--line-strong);color:var(--brand-ink);
    border-radius:9px;font-family:var(--f-ui);font-weight:600;font-size:12.5px;padding:7px 14px;
    cursor:pointer;transition:.14s}
  .tour-resume button:hover{border-color:var(--brand);background:var(--brand-soft)}
  .tour-map{margin-top:22px}
  .tour-map-h{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);margin-bottom:8px}
  /* offline syntax highlight tokens (tuned for dark) */
  .tk-kw{color:#c4b5fd;font-weight:600}
  .tk-str{color:#6ee7b7}
  .tk-com{color:#5a6480;font-style:italic}
  .tk-num{color:#fbbf24}
  @keyframes reveal{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}

  /* copy button on answers */
  .copy-btn{
    position:absolute; top:10px; right:12px; z-index:2;
    border:1px solid var(--line); background:var(--card); color:var(--muted);
    border-radius:7px; font-family:var(--f-ui); font-size:11px; font-weight:600;
    padding:3px 9px; cursor:pointer; opacity:0; transition:opacity .15s, color .12s, border-color .12s;
  }
  .bot-card:hover .copy-btn{opacity:1}
  .copy-btn:hover{color:var(--brand);border-color:var(--brand)}
  .copy-btn.ok{color:var(--brand-ink);border-color:var(--brand)}

  /* thinking: cortex knot + single status line */
  .thinking{padding:16px 20px;display:flex;align-items:center;gap:14px;min-height:54px}
  .think-knot{flex:none;width:22px;height:22px}
  .knot{fill:none;stroke:var(--brand);stroke-linecap:round;stroke-linejoin:round;
    stroke-width:9;stroke-dasharray:1;stroke-dashoffset:1;
    animation:knotloop 1.8s cubic-bezier(.45,.05,.55,.95) infinite}
  .think-lines{flex:1;min-width:0}
  .think-line{font-family:var(--f-mono);font-size:12.5px;color:var(--body);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    animation:tlfade .25s ease}

  /* ---------- composer ---------- */
  .composer{flex:none;padding:16px 36px 20px;border-top:1px solid var(--line);background:var(--bg-2)}
  .composer-inner{max-width:780px;margin:0 auto;display:flex;gap:10px;position:relative}
  .composer input{
    flex:1;padding:13px 16px 13px 40px;font-size:14px;border-radius:11px;
    font-family:var(--f-ui);font-weight:500;
    background:var(--card);border-color:var(--line-strong);color:var(--text);
  }
  .composer input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-ring)}
  .composer .ps1{
    position:absolute; left:15px; top:50%; transform:translateY(-50%);
    color:var(--muted); display:grid;place-items:center;font-size:17px;font-weight:400;pointer-events:none;
  }
  .composer .btn{padding:0 26px;border-radius:11px}
  .hint{
    max-width:780px;margin:8px auto 0;font-size:11.5px;color:var(--faint);
    display:flex;gap:18px;font-weight:500;
  }

  /* ---------- wiring diagram ---------- */
  .wirewrap{border-top:1px solid var(--line);background:var(--bg)}
  .wire-h{display:flex;align-items:center;gap:8px;padding:11px 20px;cursor:pointer;
    font-size:12px;color:var(--muted);user-select:none}
  .wire-h strong{color:var(--text);font-weight:600;font-size:12.5px}
  .wire-h:hover{color:var(--text)}
  .wire-h .caret{color:var(--muted);font-size:9px;transition:transform .2s;flex:none}
  .wirewrap.open .wire-h .caret{transform:rotate(90deg);color:var(--brand)}
  .wire-hint{margin-left:auto;font-size:10.5px;color:var(--faint);font-style:italic}
  .wire-body{display:none;padding:4px 16px 20px}
  .wirewrap.open .wire-body{display:block;animation:reveal .22s ease both}
  .wire-ctrl{display:flex;align-items:center;gap:5px;padding:0 2px 10px;flex-wrap:wrap}
  .wire-ctrl button{background:var(--inset);border:1px solid var(--line-strong);color:var(--muted);
    border-radius:6px;font-size:13px;font-weight:700;width:26px;height:26px;cursor:pointer;
    display:grid;place-items:center;transition:.12s;line-height:1;font-family:var(--f-ui)}
  .wire-ctrl button:hover{border-color:var(--brand);color:var(--brand-ink);background:var(--brand-soft)}
  .wire-ctrl .wire-fit{width:auto;padding:0 8px;font-size:10.5px}
  .wire-legend{display:flex;flex-wrap:wrap;gap:8px;padding:0;font-size:11px;color:var(--body)}
  .wire-legend span{display:inline-flex;align-items:center;gap:4px}
  .wire-legend .ek b{width:16px;height:0;display:inline-block;vertical-align:middle}
  .wire-canvas{overflow-x:auto;overflow-y:hidden;border-radius:10px;border:1px solid var(--line);
    background:var(--inset);scrollbar-width:thin;scrollbar-color:var(--line-strong) transparent}
  .wire-canvas::-webkit-scrollbar{height:5px}
  .wire-canvas::-webkit-scrollbar-track{background:transparent}
  .wire-canvas::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:99px}
  .wire-zoom-label{font-size:10.5px;color:var(--muted);font-family:var(--f-mono);min-width:34px;text-align:center}
  svg.wire{display:block}
  svg.wire .wn{fill:var(--card);stroke:var(--line-strong);stroke-width:1;
    transition:stroke .18s,stroke-width .18s,filter .18s}
  svg.wire .wlbl{font-family:var(--f-mono);font-size:11.5px;fill:rgba(222,214,200,.92);font-weight:500}
  svg.wire .wlbl2{font-family:var(--f-mono);font-size:9px;fill:rgba(148,136,116,.7);font-weight:400}
  svg.wire .we{fill:none;stroke-width:1.6;opacity:.55;animation:wedraw .6s ease both}
  svg.wire .we-import{stroke-width:2;opacity:.72}
  svg.wire .wnode{cursor:pointer;animation:cxpop .38s cubic-bezier(.25,1.35,.45,1) both}
  svg.wire .wtooltip{pointer-events:none;opacity:0;transition:opacity .14s}
  svg.wire .wtooltip.show{opacity:1}
  svg.wire.focusing .we{opacity:.06}
  svg.wire .we.lit{opacity:1!important;stroke-width:2.6!important}
  svg.wire .we.dim{opacity:.04!important}
  svg.wire .wnode.dim .wn{opacity:.12;transition:opacity .2s}
  svg.wire .wnode.dim text{opacity:.1;transition:opacity .2s}
  svg.wire .wnode:hover .wn,svg.wire.focusing .wnode:not(.dim) .wn{
    stroke:var(--brand);stroke-width:1.5;
    filter:drop-shadow(0 2px 8px rgba(100,60,20,.3))}
  svg.wire .wnode.active .wn{stroke:var(--brand);stroke-width:1.5}
  svg.wire .wchip{pointer-events:none}
  svg.wire .we-lbl{pointer-events:none;opacity:0;transition:opacity .14s}
  svg.wire .we-lbl.show{opacity:1}
  @keyframes wedraw{from{stroke-dasharray:0 1;opacity:0}to{stroke-dasharray:1 0;opacity:1}}
  @keyframes wireflow{to{stroke-dashoffset:-.1}}
  svg.wire .we-import.lit{stroke-dasharray:.07 .05!important;animation:wireflow .65s linear infinite!important;opacity:1!important}


  /* ---------- source cards (cited from index) ---------- */
  .src-bar{
    display:flex; align-items:center; gap:10px; padding:9px 22px;
    border-top:1px solid var(--line); background:var(--inset);
    font-size:11px; font-family:var(--f-mono); flex-wrap:wrap;
  }
  .src-count{color:var(--muted)}
  .src-bar-r{margin-left:auto;display:flex;align-items:center;gap:8px;flex:none}
  .ret-label{color:var(--muted);font-size:10px;letter-spacing:.07em;text-transform:uppercase}
  .ret-bar{width:44px;height:3px;border-radius:2px;background:var(--line-strong);overflow:hidden;flex:none}
  .ret-bar i{display:block;height:100%;background:var(--brand);border-radius:2px}
  .srcs-block{border-top:1px solid var(--line)}
  .srcs-h{
    padding:8px 22px 4px; font-size:9.5px; font-weight:700; letter-spacing:.09em;
    text-transform:uppercase; color:var(--faint); font-family:var(--f-ui);
  }
  .src-card{border-top:1px solid var(--line);cursor:pointer}
  .src-card:hover .src-card-head{background:rgba(255,255,255,.025)}
  .src-card-head{
    display:flex; align-items:center; gap:8px; padding:8px 22px;
    font-family:var(--f-mono); font-size:11.5px; transition:background .12s;
  }
  .src-ic{color:var(--brand-ink);font-weight:700;font-size:11px;flex:none;letter-spacing:-.04em}
  .src-path{color:var(--text);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .src-lines{color:var(--faint);font-size:10.5px;flex:none;margin-left:4px}
  .src-score-wrap{display:flex;align-items:center;gap:6px;flex:none;margin-left:auto}
  .src-score-n{color:var(--muted);font-size:10.5px}
  .src-score-bar{width:38px;height:3px;border-radius:2px;background:var(--line-strong);overflow:hidden}
  .src-score-bar i{display:block;height:100%;border-radius:2px;background:var(--brand)}
  .src-toggle{color:var(--faint);font-size:15px;flex:none;margin-left:8px;transition:transform .18s;line-height:1}
  .src-card.open .src-toggle{transform:rotate(90deg);color:var(--brand)}
  .src-snippet{display:none}
  .src-card.open .src-snippet{display:block}
  .src-snippet pre{
    margin:0 18px 10px; padding:10px 13px; overflow:auto; max-height:220px;
    background:var(--code-bg); border:1px solid var(--line); border-radius:8px;
    font-family:var(--f-mono); font-size:11px; line-height:1.6; color:var(--body); white-space:pre-wrap;
    animation:reveal .22s ease both;
  }

  /* ---------- toasts ---------- */
  #toasts{position:fixed;right:18px;bottom:18px;z-index:50;display:flex;flex-direction:column;gap:8px;max-width:430px}
  .toast{
    background:var(--card); border:1px solid var(--line); border-left:3px solid var(--brand);
    border-radius:10px; padding:11px 14px; font-size:12.5px; font-weight:500; color:var(--body);
    box-shadow:var(--shadow-md); animation:msg .3s both;
  }
  .toast.err{border-left-color:var(--bad)}

  @keyframes blink{50%{opacity:0}}
  @keyframes msg{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  @keyframes cxdraw{to{stroke-dashoffset:0}}
  @keyframes cxpop{to{transform:scale(1)}}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}
    .glyph .knot{stroke-dashoffset:0 !important;animation:none}
  }
  /* very short windows: give up the app-shell and let the page scroll */
  @media (max-height: 560px){
    body{overflow:auto}
    #app{height:auto;min-height:100vh}
    main{grid-template-rows:none}
    #msgs{min-height:260px;overflow:visible}
  }
  @media (max-width: 900px){
    main{grid-template-columns:1fr}
    aside{display:none}
    .bar-form{flex-wrap:wrap}
    .bar-form .field{flex:1 1 100%}
    .bar-form .btn{flex:1 1 100%;padding:11px}
    .brand .tag{display:none}
    .sys #sysline{display:none}
    .src .sym{display:none}
    #msgs{padding:18px 16px 12px}
    .composer{padding:12px 16px 14px}
  }

  /* ---------- theme toggle button ---------- */
  .theme-toggle{
    margin-left:auto; border:1px solid var(--line); background:transparent; color:var(--muted);
    border-radius:8px; padding:6px 10px; cursor:pointer; display:flex; align-items:center;
    gap:6px; font-size:11.5px; font-weight:600; font-family:var(--f-ui);
    transition:color .15s, border-color .15s, background .15s;
  }
  .theme-toggle:hover{color:var(--text);border-color:var(--brand)}
  .sys{margin-left:0}

  /* ---------- light theme — premium clean ---------- */
  [data-theme="light"]{
    --bg:#eaecf4; --bg-2:#e2e5ef; --card:#ffffff; --inset:#d8dce8; --code-bg:#1e1b2e;
    --line:#dde0e8; --line-strong:#cdd0da;
    --text:#111318; --body:#363b4a; --muted:#6b7280; --faint:#9ca3af;
    --brand:#5b38cc; --brand-deep:#4a2eb0; --brand-ink:#5b38cc;
    --brand-soft:rgba(91,56,204,.1); --brand-ring:rgba(91,56,204,.22);
    --ok:#16a34a; --ok-soft:rgba(22,163,74,.1);
    --bad:#dc2626; --bad-soft:rgba(220,38,38,.1);
    --shadow-sm:0 1px 2px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);
    --shadow-md:0 2px 6px rgba(0,0,0,.06),0 6px 20px rgba(0,0,0,.05);
    --shadow-lg:0 8px 24px rgba(0,0,0,.09),0 20px 48px rgba(0,0,0,.07);
  }
  [data-theme="light"] body{
    background-color:#eaecf4;
    background-image:
      radial-gradient(ellipse 75% 55% at 8% 18%,  rgba(138,110,255,.16) 0%,transparent 58%),

<script>
const $ = s => document.querySelector(s);
let activeNs = null, history = [], nsMeta = {};

const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
const SPARKLE_SVG = '<svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true">'
  + '<path d="M12 2C12 2 13 8.5 15.2 10.8C17.4 13.1 24 12 24 12C24 12 17.4 10.9 15.2 13.2C13 15.5 12 22 12 22C12 22 11 15.5 8.8 13.2C6.6 10.9 0 12 0 12C0 12 6.6 13.1 8.8 10.8C11 8.5 12 2 12 2Z" fill="#fff"/>'
  + '</svg>';
const BOT_AV_EL = '<div class="bot-av">' + SPARKLE_SVG + '</div>';
const USER_AV_EL = '<div class="user-av"><svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="3.5"/><path d="M4 20c0-4 3.6-6.5 8-6.5s8 2.5 8 6.5"/></svg></div>';
const KNOT = '<svg class="think-knot" viewBox="0 0 100 100" aria-hidden="true" style="width:32px;height:32px;margin-bottom:8px">'
  +'<path class="knot" pathLength="1" d="M32 40 H68 A8 8 0 1 0 60 32 V68 A8 8 0 1 0 68 60 H32 A8 8 0 1 0 40 68 V32 A8 8 0 1 0 32 40 Z"/></svg>';

function esc(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
function md(s){
  let h = esc(s);
  h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/^[-*] (.*)$/gm, '<span class="li">•&nbsp; $1</span>');
  h = h.replace(/^(\d+)\. (.*)$/gm, '<span class="li">$1.&nbsp; $2</span>');
  h = h.replace(/\n/g, '<br>').replace(/<\/span><br>/g, '</span>');
  return h;
}
// offline, dependency-free syntax highlighter (tokenizer, escape-safe)
const HL_KW = new Set(('function return const let var if else for while do class export import '
  + 'from default new this async await public private protected static void extends implements '
  + 'interface type enum def self True False None try except catch finally throw switch case break '
  + 'continue null true false undefined typeof instanceof yield super namespace readonly').split(' '));
function highlight(code){
  const e = c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c] || c);
  const esc = t => Array.from(t).map(e).join('');
  let out = '', i = 0; const n = code.length;
  const span = (cls, t) => { out += '<span class="tk-' + cls + '">' + esc(t) + '</span>'; };
  while (i < n){
    const c = code[i];
    if (c === '/' && code[i+1] === '/'){ let j = code.indexOf('\n', i); if (j < 0) j = n; span('com', code.slice(i, j)); i = j; continue; }
    if (c === '#'){ let j = code.indexOf('\n', i); if (j < 0) j = n; span('com', code.slice(i, j)); i = j; continue; }
    if (c === '/' && code[i+1] === '*'){ let j = code.indexOf('*/', i); j = j < 0 ? n : j + 2; span('com', code.slice(i, j)); i = j; continue; }
    if (c === '"' || c === "'" || c === '`'){ let j = i+1; while (j < n && code[j] !== c){ if (code[j] === '\\') j++; j++; } j = Math.min(j+1, n); span('str', code.slice(i, j)); i = j; continue; }
    if (c >= '0' && c <= '9'){ let j = i; while (j < n && /[0-9a-fxA-FX._]/.test(code[j])) j++; span('num', code.slice(i, j)); i = j; continue; }
    if (/[A-Za-z_$]/.test(c)){ let j = i; while (j < n && /[A-Za-z0-9_$]/.test(code[j])) j++; const w = code.slice(i, j); if (HL_KW.has(w)) span('kw', w); else out += esc(w); i = j; continue; }
    out += e(c); i++;
  }
  return out;
}
function addCopyButton(botEl, text){
  const target = botEl.classList.contains('bot-card') ? botEl : (botEl.querySelector('.bot-card') || botEl);
  if (target.querySelector('.copy-btn')) return;
  botEl = target;
  const b = document.createElement('button');
  b.className = 'copy-btn'; b.textContent = 'Copy';
  b.onclick = async () => {
    try { await navigator.clipboard.writeText(text); b.textContent = 'Copied'; b.classList.add('ok');
          setTimeout(() => { b.textContent = 'Copy'; b.classList.remove('ok'); }, 1400); }
    catch { toast('Copy failed', true); }
  };
  botEl.appendChild(b);
}
function toast(msg, err){
  const t = document.createElement('div');
  t.className = 'toast' + (err ? ' err' : '');
  t.textContent = msg;
  $('#toasts').appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .4s'; setTimeout(() => t.remove(), 450); }, 6500);
}
async function api(path, body, method){
  const opts = { method: method || (body !== undefined ? 'POST' : 'GET'),
                 headers: { 'Authorization': 'Bearer ' + $('#key').value.trim() } };
  if (body !== undefined){
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
  return d;
}
function scrollBottom(){ const m = $('#msgs'); m.scrollTop = m.scrollHeight; }

/* ---------- typewriter: stream the answer into view ---------- */
function typeInto(el, html, onDone){
  if (REDUCED){ el.innerHTML = html; onDone && onDone(); return; }
  const src = document.createElement('div'); src.innerHTML = html;
  const total = (src.textContent || '').length;
  const perTick = Math.max(1, Math.round(total / 300));   // whole answer in ~5s
  el.innerHTML = ''; el.classList.add('typing');
  let queue = []; src.childNodes.forEach(n => queue.push({ n, dest: el }));
  let curText = null, curNode = null, pos = 0, skipped = false;
  el.closest('.turn').addEventListener('click', () => { skipped = true; }, { once: true });
  function finish(){ el.classList.remove('typing'); onDone && onDone(); scrollBottom(); }
  function tick(){
    if (skipped){ el.innerHTML = html; finish(); return; }
    let budget = perTick;
    while (budget > 0){
      if (curText !== null){
        const take = Math.min(budget, curText.length - pos);
        curNode.nodeValue += curText.substr(pos, take);
        pos += take; budget -= take;
        if (pos >= curText.length) curText = null;
      } else {
        const item = queue.shift();
        if (!item){ finish(); return; }
        if (item.n.nodeType === 3){
          curText = item.n.nodeValue; pos = 0;
          curNode = document.createTextNode(''); item.dest.appendChild(curNode);
        } else {
          const clone = item.n.cloneNode(false); item.dest.appendChild(clone);
          const kids = []; item.n.childNodes.forEach(k => kids.push({ n: k, dest: clone }));
          queue = kids.concat(queue);
        }
      }
    }
    scrollBottom();
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/* ---------- health ---------- */
(async () => {
  try {
    const h = await fetch('/health').then(r => r.json());
    $('#sysdot').classList.add('on');
    $('#sysline').textContent = (h.backend || '?') + ' · v' + (h.version || '?');
  } catch { $('#sysline').textContent = 'offline'; }
})();

/* ---------- pending sidebar entry during ingest ---------- */
function addPendingNs(label){
  const c = $('#nsList');
  const existing = c.querySelector('.ns-pending');
  if (existing) existing.remove();
  const row = document.createElement('div');
  row.className = 'ns ns-pending';
  row.style.opacity = '.6';
  row.innerHTML = '<div class="idx">…</div>'
    + '<div style="min-width:0"><div class="nm">' + esc(label) + '</div>'
    + '<div class="meta" style="color:var(--brand-ink)">indexing…</div></div>';
  c.querySelector('.empty-side') && (c.innerHTML = '');
  c.prepend(row);
}

/* ---------- namespaces ---------- */
async function loadNamespaces(){
  try {
    const d = await api('/v1/namespaces');
    const list = d.namespaces || [];
    nsMeta = {};
    const c = $('#nsList');
    if (!list.length){ c.innerHTML = '<div class="empty-side">None yet — ingest one above.</div>'; return; }
    c.innerHTML = '';
    const countEl = document.getElementById('repoCount');
    if (countEl) countEl.textContent = list.length;
    list.forEach((n, i) => {
      nsMeta[n.namespace] = n;
      const row = document.createElement('div');
      row.className = 'ns' + (n.namespace === activeNs ? ' active' : '');
      const lang = n.stack ? esc(n.stack) : (n.language ? esc(n.language) : '');
      const stats = [n.n_files ? n.n_files + ' files' : '', n.n_chunks ? n.n_chunks + ' chunks' : ''].filter(Boolean).join(' · ');
      row.innerHTML = '<div class="idx"></div>'
        + '<div style="min-width:0"><div class="nm">' + esc(n.namespace) + '</div>'
        + (lang ? '<div class="meta">' + lang + '</div>' : '')
        + (stats ? '<div class="stats">' + esc(stats) + '</div>' : '') + '</div>';
      row.onclick = () => selectNamespace(n.namespace);
      c.appendChild(row);
    });
  } catch (e){ toast('namespaces: ' + e.message, true); }
}

function setActive(ns){
  activeNs = ns; history = [];
  $('#nsNow').textContent = ns || '—';
  $('#hintNs').textContent = ns ? 'Session: ' + ns : '';
  $('#tourSec').style.display = ns ? '' : 'none';
  const dot = $('#nsDot');
  if (dot) dot.style.background = ns ? 'var(--brand)' : 'var(--faint)';
  const meta = $('#nsMeta');
  if (meta && ns && nsMeta[ns]) {
    const m = nsMeta[ns];
    const parts = [m.n_chunks ? m.n_chunks + ' chunks' : '', m.backend || ''].filter(Boolean);
    meta.textContent = parts.length ? '· ' + parts.join(' · ') : '';
  } else if (meta) { meta.textContent = ''; }
  document.querySelectorAll('.ns').forEach(el => {
    const active = el.querySelector('.nm') && el.querySelector('.nm').textContent === ns;
    el.classList.toggle('active', active);
  });
}

const Q_STARTERS = [
  'How is authentication handled?',
  'What are the main features?',
  'How is routing configured?',
  'Where is the app entry point?',
  'How is data fetched from the API?',

async function restoreChatLog(ns){
  try {
    const d = await api('/v1/chat/' + encodeURIComponent(ns));
    const turns = (d.turns || []).slice(-20);
    if (!turns.length) return false;
    $('#stream').innerHTML = '';
    turns.forEach(t => {
      if (t.role === 'user'){
        addTurn('<div class="user-bubble">' + esc(t.content) + '</div>' + USER_AV_EL, 'user');
      } else {
        const bot = addTurn(BOT_AV_EL + '<div class="bot-card"><div class="answer">' + md(t.content) + '</div></div>', 'bot');
        const card = bot.querySelector('.bot-card');
        if (t.wiring) card.insertAdjacentHTML('beforeend', renderWiring(t.wiring));
        if (t.sources && t.sources.length) {
          const sm = {};
          t.sources.forEach(s => { sm[s.path] = s; });
          bot._srcMap = sm;
        }
        addCopyButton(card, t.content);
      }
      history.push({ role: t.role, content: t.content });
    });
    scrollBottom();
    return true;
  } catch { return false; }
}

/* ---------- ingest ---------- */
const INGEST_STAGES_LOCAL = ['Walking the repository', 'Chunking code at function boundaries',
  'Building the search index', 'Embedding for semantic retrieval'];
const INGEST_STAGES_CLONE = ['Cloning the repository', 'Walking the repository',
  'Chunking code at function boundaries', 'Building the search index', 'Embedding for semantic retrieval'];
function ingestUI(isClone, repoLabel){
  let i = 0;
  const STAGES = isClone ? INGEST_STAGES_CLONE : INGEST_STAGES_LOCAL;
  const LAST = STAGES.length - 1;
  const steps = STAGES.map((s, k) =>
    '<div class="istep" data-k="' + k + '">'
    + '<div class="istep-left"><div class="idot"></div>'
    + '<div class="istep-line"></div></div>'
    + '<div class="istep-body"><span class="istep-label">' + esc(s) + '</span></div>'
    + '</div>'
  ).join('');
  const metaEl = '<p class="imeta" id="ingestMeta">'
    + (isClone ? 'Cloning may take a moment depending on repo size. ' : '')
    + 'A new repo can take a few minutes. Re-indexing is fast.</p>';
  const title = isClone
    ? 'Cloning &amp; indexing' + (repoLabel ? ' <span style="color:var(--brand-ink);font-size:14px">'+esc(repoLabel)+'</span>' : '')
    : 'Indexing the repository';
  $('#stream').innerHTML = '<div class="ingesting">' + KNOT
    + '<h2>' + title + '</h2>'
    + '<div class="isteps">' + steps + '</div>' + metaEl + '</div>';
  const mark = () => {
    document.querySelectorAll('.istep').forEach(el => {
      const k = +el.dataset.k;
      el.classList.toggle('done', k < i);
      el.classList.toggle('active', k === i);
    });
  };
  mark();
  const t = setInterval(() => { i = Math.min(i + 1, LAST); mark(); }, isClone ? 3200 : 2600);
  return () => clearInterval(t);
}
$('#ingestBtn').onclick = async () => {
  const isClone = _ingestMode === 'clone';
  const repo = isClone ? '' : ($('#repo').value.trim());
  let cloneUrl = isClone ? ($('#cloneUrl').value.trim()) : '';
  if (!repo && !cloneUrl) return toast('Enter a ' + (isClone ? 'clone URL' : 'repository path'), true);
  if (isClone && !/^(https?:\/\/|git@)/.test(cloneUrl))
    return toast('Enter a valid git URL (https://… or git@…)', true);
  const body = { namespace: $('#ns').value.trim() || null, rebuild: false };
  if (isClone) {
    body.clone_url = cloneUrl;
  } else {
    body.repo_path = repo;
  }
  $('#ingestBtn').disabled = true;
  $('#ingestBtn').textContent = isClone ? 'Cloning…' : 'Indexing…';
  // derive a display name for the sidebar from the URL or path
  const repoLabel = isClone
    ? (cloneUrl.split('/').pop().replace(/\.git$/, '') || cloneUrl)
    : (repo.split(/[\\/]/).pop() || repo);
  // show a pending entry in the sidebar immediately so the user knows what's being indexed
  addPendingNs(repoLabel);
  const stop = ingestUI(isClone, repoLabel);
  try {
    const d = await api('/v1/ingest', body);
    stop();
    setActive(d.namespace);
    const chunks = d.chunks_indexed + ' chunks' + (d.already_indexed ? ' (cached)' : '');
    showStarters(d);
    toast('Indexed "' + d.namespace + '": ' + d.files_indexed + ' files, ' + chunks);
    await loadNamespaces();
    setActive(d.namespace);
    const restored = await restoreChatLog(d.namespace);
    if (!restored) $('#stream').innerHTML = emptyState(d.namespace, 'Index ready — ask anything below.', true);
  } catch (e){ stop(); toast('Ingest failed: ' + e.message, true);
    $('#stream').innerHTML = emptyState('Ingest failed', e.message); }
  finally { $('#ingestBtn').disabled = false; $('#ingestBtn').textContent = 'Index'; }
};
